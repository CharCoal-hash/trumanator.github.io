<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Dashboard (v5.0.0)</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-dark:#0f172a; --panel:rgba(30,41,59,0.82); --border:rgba(255,255,255,0.12); --green:#10b981; --blue:#3b82f6; --purple:#8b5cf6; --red:#ef4444; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100vh; font-family:system-ui,sans-serif; color:#f8fafc; padding:0; background:linear-gradient(120deg,#ff4d6d,#ff9966,#ffe66d,#8fd14f,#4cc9f0,#7b61ff,#ff4d6d); background-size:400% 400%; animation:rainbowShift 16s ease infinite; }
        body::before { content:""; position:fixed; inset:-20%; background:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3), transparent 25%), radial-gradient(circle at 80% 0%, rgba(255,255,255,0.2), transparent 30%); pointer-events:none; z-index:-1; animation:drift 11s ease-in-out infinite alternate; }
        @keyframes rainbowShift { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
        @keyframes drift { from{transform:translate3d(-3%, -2%, 0) scale(1);} to{transform:translate3d(3%, 2%, 0) scale(1.06);} }
        .app-shell { display: flex; min-height: 100vh; }
        .app-sidebar {
            width: 220px; background: rgba(2, 6, 23, 0.92); border-right: 1px solid rgba(255,255,255,0.08); padding: 24px 16px; display: flex; flex-direction: column; gap: 10px; box-shadow: 8px 0 24px rgba(0,0,0,0.24);
        }
        .app-sidebar .brand { font-size: 1rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #38bdf8; margin-bottom: 16px; }
        .nav-link {
            display: block; padding: 10px 12px; border-radius: 10px; color: #e2e8f0; text-decoration: none; font-weight: 600; background: rgba(255,255,255,0.04); border: 1px solid transparent; transition: all 0.2s ease;
        }
        .nav-link:hover, .nav-link.active { background: rgba(56,189,248,0.16); border-color: rgba(56,189,248,0.32); color: white; }
        .page-content { flex: 1; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width:980px; background:linear-gradient(145deg, rgba(30,41,59,0.9), rgba(15,23,42,0.82)); border:1px solid var(--border); border-radius:24px; padding:28px; box-shadow:0 20px 45px rgba(0,0,0,0.36), inset 0 1px 0 rgba(255,255,255,0.09); }
        .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
        .btn { border:none; border-radius:12px; padding:12px 16px; color:white; font-weight:bold; cursor:pointer; background:linear-gradient(145deg, var(--green), #047857); text-decoration:none; display:inline-block; }
        .btn.secondary { background:linear-gradient(145deg, var(--blue), #2563eb); }
        .btn.danger { background:linear-gradient(145deg, var(--red), #b91c1c); }
        .card { background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(15,23,42,0.16)); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:16px; margin-bottom:12px; }
        .muted { color:#94a3b8; font-size:0.95rem; }
        .hidden { display:none !important; }
        .list { display:grid; gap:12px; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="app-sidebar">
        <div class="brand">Quiz Hub</div>
        <div class="sidebar-profile" id="sidebar-profile" style="display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); margin-bottom:6px;">
            <img id="sidebar-profile-img" src="https://www.gravatar.com/avatar/00000000000000000000000000000?d=mp&f=y" alt="profile" style="width:42px; height:42px; border-radius:50%; object-fit:cover; background:#020617;">
            <div style="min-width:0;">
                <div id="sidebar-profile-name" style="font-size:0.95rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Guest</div>
                <div id="sidebar-profile-sub" style="font-size:0.78rem; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">No account linked</div>
            </div>
        </div>
        <a class="nav-link" href="host.html">Host</a>
        <a class="nav-link" href="player.html">Player</a>
        <a class="nav-link" href="creator.html">Creator</a>
        <a class="nav-link active" href="dashboard.html">Dashboard</a>
    </aside>
    <div class="page-content">
        <div class="container">
            <h1 style="margin:0 0 8px 0;">Quiz Dashboard</h1>
    <p class="muted" style="margin:0 0 16px 0;">Manage your saved quizzes from Google Cloud.</p>
    <div class="toolbar">
        <button id="sign-in-btn" class="btn secondary">Sign in with Google</button>
        <button id="sign-out-btn" class="btn danger hidden">Sign out</button>
        <a class="btn secondary" href="creator.html">Back to Creator</a>
    </div>
    <div id="status" class="muted">Loading your quizzes…</div>
    <div id="quiz-list" class="list" style="margin-top:16px;"></div>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: 'AIzaSyAUubLENrdSf73X4-oEAwS7uoLiQsAqEMs',
        authDomain: 'quizapp-f7e02.firebaseapp.com',
        projectId: 'quizapp-f7e02',
        storageBucket: 'quizapp-f7e02.firebasestorage.app',
        messagingSenderId: '173913988071',
        appId: '1:173913988071:web:d8f11750d61ccd834e3b42',
        measurementId: 'G-GESK9DQXT1'
    };
    const isFirebaseConfigured = Object.values(firebaseConfig).every(value => typeof value === 'string' && !value.startsWith('YOUR_'));
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: 'select_account' });
    
    function getStoredProfile() {
        try {
            const raw = localStorage.getItem('quizAppProfile');
            return raw ? JSON.parse(raw) : null;
        } catch (err) {
            return null;
        }
    }

    // --- READS USERNAME AND B64 ICON DIRECTLY FROM LOCALSTORAGE ---
    function updateSidebarProfile() {
        const profile = getStoredProfile() || {};
        
        // Prioritize b64Avatar string over older web URLs
        const name = profile.displayName || 'Guest';
        const avatar = profile.b64Avatar || profile.avatarUrl || profile.photoUrl || 'https://www.gravatar.com/avatar/00000000000000000000000000000?d=mp&f=y';
        
        document.getElementById('sidebar-profile-name').innerText = name;
        document.getElementById('sidebar-profile-img').src = avatar;
        document.getElementById('sidebar-profile-sub').innerText = profile.uid ? 'Signed in' : 'No account linked';
    }

    // Initialize sidebar based on cached layout variables immediately
    updateSidebarProfile();

    const quizList = document.getElementById('quiz-list');
    const status = document.getElementById('status');
    const signInBtn = document.getElementById('sign-in-btn');
    const signOutBtn = document.getElementById('sign-out-btn');

    function renderQuizzes(quizzes) {
        quizList.innerHTML = '';
        if (!quizzes.length) {
            quizList.innerHTML = '<div class="card">No quizzes saved yet.</div>';
            return;
        }
        quizzes.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap;">
                    <div>
                        <strong>${item.title || 'Untitled quiz'}</strong>
                        <div class="muted">${item.questions ? item.questions.length : 0} questions</div>
                        <div class="muted">Saved by ${item.ownerName || 'a user'}</div>
                    </div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <button class="btn secondary" onclick="downloadQuiz('${item.id}')">Download</button>
                        <button class="btn danger" onclick="deleteQuiz('${item.id}')">Delete</button>
                    </div>
                </div>
            `;
            quizList.appendChild(card);
        });
    }

    async function loadQuizzes(user) {
        if (!isFirebaseConfigured) {
            quizList.innerHTML = '<div class="card">This dashboard needs a real Firebase project to load cloud quizzes.</div>';
            status.innerText = 'Connect this app to Firebase to enable cloud quiz storage.';
            return;
        }
        if (!user) {
            quizList.innerHTML = '<div class="card">Sign in to view your saved quizzes.</div>';
            status.innerText = 'Please sign in to see your cloud quizzes.';
            return;
        }
        status.innerText = 'Loading your quizzes…';
        try {
            const snapshot = await db.collection('users').doc(user.uid).collection('quizzes').orderBy('updatedAt', 'desc').get();
            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderQuizzes(items);
            status.innerText = `Loaded ${items.length} quiz${items.length === 1 ? '' : 'es'}.`;
        } catch (err) {
            status.innerText = `Failed to load quizzes: ${err.message}`;
        }
    }

    // --- CONVERTS IMAGE URL TO BASE64 STRING STREAM SAFELY ---
    async function convertImageUrlToBase64(url) {
        if (!url) return '';
        try {
            const response = await fetch(url, { mode: 'cors' });
            const blob = await response.blob();
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            console.warn("Could not convert avatar image link to base64 stream automatically:", e);
            return url; // Fallback to direct network image context if standard extraction errors out
        }
    }

    async function signIn() {
        if (!isFirebaseConfigured) {
            status.innerText = 'Connect this app to a real Firebase project to enable Google sign-in.';
            return;
        }
        try { await auth.signInWithPopup(googleProvider); } catch (err) {
            const message = err && err.message ? err.message : String(err);
            if (message.includes('authorized for OAuth operations')) {
                status.innerText = 'Firebase blocked the sign-in because this domain is not authorized. Add this site to Authentication → Settings → Authorized domains in Firebase, then try again.';
            } else {
                status.innerText = `Sign-in failed: ${message}`;
            }
        }
    }

    async function signOut() { 
        try { 
            await auth.signOut(); 
        } catch (err) { 
            status.innerText = `Sign-out failed: ${err.message}`; 
        } 
    }

    window.downloadQuiz = async function(docId) {
        const doc = await db.collection('users').doc(auth.currentUser.uid).collection('quizzes').doc(docId).get();
        if (!doc.exists) return;
        const data = doc.data();
        const blob = new Blob([JSON.stringify(data.questions || [], null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${(data.title || 'quiz').replace(/\s+/g, '-').toLowerCase()}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
    };

    window.deleteQuiz = async function(docId) {
        if (!auth.currentUser) return;
        if (confirm("Are you sure you want to delete this quiz from the cloud?")) {
            await db.collection('users').doc(auth.currentUser.uid).collection('quizzes').doc(docId).delete();
            loadQuizzes(auth.currentUser);
        }
    };

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            signInBtn.classList.add('hidden');
            signOutBtn.classList.remove('hidden');
            
            // Check if we already have an initialized b64 profile cached locally
            let currentCachedProfile = getStoredProfile() || {};
            let base64AvatarString = currentCachedProfile.b64Avatar || '';
            
            if (!base64AvatarString && user.photoURL) {
                status.innerText = 'Processing secure profile image assets...';
                base64AvatarString = await convertImageUrlToBase64(user.photoURL);
            }
            
            const profilePayload = {
                uid: user.uid,
                displayName: currentCachedProfile.displayName || user.displayName || 'Google User',
                avatarUrl: user.photoURL || 'https://www.gravatar.com/avatar/00000000000000000000000000000?d=mp&f=y',
                b64Avatar: base64AvatarString
            };
            
            localStorage.setItem('quizAppProfile', JSON.stringify(profilePayload));
            updateSidebarProfile();
            loadQuizzes(user);
        } else {
            signInBtn.classList.remove('hidden');
            signOutBtn.classList.add('hidden');
            
            localStorage.removeItem('quizAppProfile');
            updateSidebarProfile();
            
            quizList.innerHTML = '<div class="card">Sign in to view your saved quizzes.</div>';
            status.innerText = 'Please sign in to see your cloud quizzes.';
        }
    });

    signInBtn.addEventListener('click', signIn);
    signOutBtn.addEventListener('click', signOut);
</script>
</body>
</html>
