<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Quiz - Presentation Core</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --glass-panel: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: hostBackground 16s ease infinite;
        }

        @keyframes hostBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-stage {
            width: 100%;
            max-width: 1000px;
            background: var(--glass-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 45px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { font-size: 1.3rem; color: #94a3b8; margin-bottom: 30px; }
        .split-lobby { display: flex; gap: 40px; justify-content: center; align-items: flex-start; flex-wrap: wrap; margin-top: 20px; }
        
        .qr-node {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 24px;
            display: inline-block;
        }

        #qrcode { background: white; padding: 16px; border-radius: 16px; display: inline-block; }
        
        .room-tag {
            font-family: monospace; font-size: 1.2rem; font-weight: 800; color: #38bdf8; margin-top: 14px;
            background: rgba(56, 189, 248, 0.1); padding: 6px 14px; border-radius: 10px; display: inline-block;
        }

        .roster-card {
            width: 460px; background: rgba(0, 0, 0, 0.25); border-radius: 24px; padding: 24px;
            border: 1px solid rgba(255,255,255,0.04); min-height: 290px; text-align: left;
        }

        .roster-card h3 { margin-top: 0; font-size: 1.3rem; color: #cbd5e1; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }

        .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 220px; overflow-y: auto; margin-top: 15px; }

        .player-chip {
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 14px; border-radius: 12px; font-weight: 700; display: flex;
            align-items: center; justify-content: space-between; font-size: 1rem; cursor: pointer;
            transition: background 0.2s;
        }
        .player-chip:hover { background: rgba(255, 255, 255, 0.15); }

        /* Configuration Panels */
        .config-row { margin: 20px 0; font-size: 1.2rem; color: #cbd5e1; }
        select { background: #1e293b; color: white; border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 8px; font-size: 1rem; font-weight: 600; outline: none; }

        .launch-btn {
            background: var(--accent-green); color: white; border: none; padding: 18px 50px; font-size: 1.6rem;
            border-radius: 16px; cursor: pointer; font-weight: 800; margin-top: 20px; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); display: none;
        }

        .hidden { display: none !important; }

        /* Match Runtime UI Components */
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: rgba(0,0,0,0.2); padding: 15px 30px; border-radius: 16px; }
        .timer-display { font-size: 2.2rem; font-weight: 900; color: #fbbf24; }
        .question-box { background: white; color: #0f172a; padding: 40px; border-radius: 24px; font-size: 3rem; font-weight: 900; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .options-display-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .display-option { background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1); padding: 25px; font-size: 1.5rem; font-weight: 700; border-radius: 16px; text-align: left; display: flex; align-items: center; gap: 15px; }
        .display-option.correct { background: rgba(16, 185, 129, 0.2) !important; border-color: var(--accent-green) !important; color: #34d399; }
        .display-option.revealed { opacity: 0.5; }

        .shape-indicator { width: 24px; height: 24px; border-radius: 6px; display: inline-block; }
        .shape-0 { background: #ef4444; } .shape-1 { background: #3b82f6; } .shape-2 { background: #eab308; } .shape-3 { background: #10b981; }

        /* Leaderboard and Mod Overlays */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 20px; }
        td, th { padding: 16px 20px; text-align: left; font-size: 1.2rem; }
        th { color: #94a3b8; text-transform: uppercase; }
        td { background: rgba(255, 255, 255, 0.04); font-weight: 600; }
        td:first-child { border-radius: 14px 0 0 14px; font-weight: 800; color: #38bdf8; }
        td:last-child { border-radius: 0 14px 14px 0; text-align: right; color: #34d399; }

        /* Moderation Modal Window */
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-body { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 360px; text-align: left; }
        .modal-body h4 { margin-top: 0; font-size: 1.3rem; margin-bottom: 15px; }
        .modal-body input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; size: 1.1rem; box-sizing: border-box; margin-bottom: 20px; }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .mod-btn { padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .mod-save { background: var(--accent-blue); color: white; }
        .mod-kick { background: #f97316; color: white; }
        .mod-ban { background: var(--accent-red); color: white; }
        .mod-cancel { background: #475569; color: white; }
    </style>
</head>
<body>

<div class="main-stage">
    <div id="stage-lobby">
        <h1>Jeu de Vocabulaire Français</h1>
        <p class="subtitle">Scan the QR code to connect instantly.</p>
        
        <div class="split-lobby">
            <div class="qr-node">
                <div id="qrcode"></div>
                <div><span class="room-tag" id="room-code-badge">Creating Room...</span></div>
            </div>
            
            <div class="roster-card">
                <h3>Active Players (<span id="lobby-count" style="color:var(--accent-blue)">0</span>) <span style="font-size:0.8rem; float:right; color:#64748b; font-weight:normal;">Click player to moderate</span></h3>
                <div class="badge-grid" id="lobby-grid-target"></div>
            </div>
        </div>

        <div class="config-row">
            <label>Question Timer Duration: </label>
            <select id="timer-selection">
                <option value="10">10 Seconds</option>
                <option value="20" selected>20 Seconds</option>
                <option value="30">30 Seconds</option>
                <option value="45">45 Seconds</option>
            </select>
        </div>
        
        <button id="action-launch-trigger" class="launch-btn" onclick="broadcastStartSignal()">START MATCH</button>
    </div>

    <div id="stage-match" class="hidden">
        <div class="game-header">
            <div style="font-size: 1.3rem; font-weight:800;">Question <span id="hud-q-index">1</span> / 5</div>
            <div class="timer-display" id="hud-timer">--</div>
            <div style="font-size: 1.2rem; color: #a7f3d0;" id="hud-answers-counter">Answers: 0 / 0</div>
        </div>

        <div class="question-box" id="current-question-text">...</div>

        <div class="options-display-grid" id="options-container-grid">
            <div class="display-option"><span class="shape-indicator shape-0"></span><span class="opt-text"></span></div>
            <div class="display-option"><span class="shape-indicator shape-1"></span><span class="opt-text"></span></div>
            <div class="display-option"><span class="shape-indicator shape-2"></span><span class="opt-text"></span></div>
            <div class="display-option"><span class="shape-indicator shape-3"></span><span class="opt-text"></span></div>
        </div>

        <button class="launch-btn" id="next-step-btn" style="display:inline-block;" onclick="progressGameLoop()">Reveal Answer</button>
    </div>

    <div id="stage-scoreboard" class="hidden">
        <h1 style="background: linear-gradient(to right, #34d399, #3b82f6); -webkit-background-clip: text;">Final Standings</h1>
        <p class="subtitle">Presentation Completed</p>
        <table>
            <thead>
                <tr><th style="width: 20%">Rank</th><th style="width: 55%">Competitor Name</th><th style="width: 25%; text-align: right;">Total Points</th></tr>
            </thead>
            <tbody id="scoreboard-table-body"></tbody>
        </table>
        <button class="launch-btn" style="display:inline-block; background:#475569;" onclick="window.location.reload()">Host New Room</button>
    </div>
</div>

<div class="modal-overlay hidden" id="mod-modal">
    <div class="modal-body">
        <h4 id="mod-target-title">Moderate Player</h4>
        <input type="text" id="mod-name-input" placeholder="Edit Player Name">
        <div class="modal-actions">
            <button class="mod-btn mod-save" onclick="executeRename()">Save Changes</button>
            <button class="mod-btn mod-kick" onclick="executeKick()">Kick from Room</button>
            <button class="mod-btn mod-ban" onclick="executeBan()">Ban Player Profile</button>
            <button class="mod-btn mod-cancel" onclick="closeModModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    const DEPLOYED_PLAYER_URL = "https://charcoal-hash.github.io/trumanator.github.io/player.html";

    const vocabPool = [
        { french: "Bonjour", english: "Hello", wrongs: ["Goodbye", "Thank you", "Please"] },
        { french: "Chat", english: "Cat", wrongs: ["Dog", "Bird", "Mouse"] },
        { french: "Pomme", english: "Apple", wrongs: ["Banana", "Orange", "Grape"] },
        { french: "Livre", english: "Book", wrongs: ["Pen", "Chair", "Table"] },
        { french: "Voiture", english: "Car", wrongs: ["Bicycle", "Train", "Plane"] }
    ];

    function generateSecureId() {
        const structuralAlphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let builtToken = "";
        for (let idx = 0; idx < 4; idx++) { builtToken += structuralAlphabet.charAt(Math.floor(Math.random() * structuralAlphabet.length)); }
        return builtToken;
    }
    
    const calculatedRoomToken = generateSecureId();
    let trackingScoreboardMap = {}; 
    let playerPeerIdMap = {}; // Maps Name -> Peer ID string
    let activeClientConnections = {}; // Maps Name -> Connection Object
    let bannedPeerIds = new Set();
    
    let currentQuestionIndex = 0;
    let selectedTimerDuration = 20;
    let countdownInterval = null;
    let activeSecondsLeft = 0;
    let answersSubmittedThisRound = 0;
    let matchPhase = "LOBBY"; // LOBBY, QUESTION, REVEAL, END
    let shufflesThisRound = [];
    let moddingPlayerName = "";

    const peerInstance = new Peer(calculatedRoomToken);

    peerInstance.on('open', (validatedId) => {
        document.getElementById("room-code-badge").innerText = "ROOM: " + validatedId;
        const compiledTargetUrl = `${DEPLOYED_PLAYER_URL}?room=${validatedId}`;
        new QRCode(document.getElementById("qrcode"), { text: compiledTargetUrl, width: 210, height: 210 });
    });

    peerInstance.on('connection', (incomingClientChannel) => {
        incomingClientChannel.on('data', (incomingPackage) => {
            let pId = incomingClientChannel.peer;
            
            if (bannedPeerIds.has(pId)) {
                incomingClientChannel.send({ type: 'BANNED' });
                setTimeout(() => incomingClientChannel.close(), 500);
                return;
            }

            if (incomingPackage.type === 'JOIN') {
                let uniqueName = incomingPackage.name.trim();
                if (trackingScoreboardMap[uniqueName] !== undefined) {
                    uniqueName += "_" + Math.floor(Math.random() * 100);
                }
                
                trackingScoreboardMap[uniqueName] = 0;
                playerPeerIdMap[uniqueName] = pId;
                activeClientConnections[uniqueName] = incomingClientChannel;
                
                incomingClientChannel.send({ type: 'JOIN_CONFIRM', assignedName: uniqueName });
                
                refreshLobbyRosterView();
                document.getElementById("action-launch-trigger").style.display = "inline-block";
            }
            
            if (incomingPackage.type === 'ANSWER_SUBMIT') {
                if(matchPhase !== "QUESTION") return;
                answersSubmittedThisRound++;
                updateAnswerHUDCount();
                
                let currentCorrectWord = vocabPool[currentQuestionIndex].english;
                if(incomingPackage.choice === currentCorrectWord) {
                    trackingScoreboardMap[incomingPackage.name] += 100 + (activeSecondsLeft * 5); // Speed bonus
                }
                
                if (answersSubmittedThisRound >= Object.keys(trackingScoreboardMap).length) {
                    revealRoundResults();
                }
            }
        });
    });

    function refreshLobbyRosterView() {
        const gridBox = document.getElementById("lobby-grid-target");
        gridBox.innerHTML = "";
        const identityKeys = Object.keys(trackingScoreboardMap);
        document.getElementById("lobby-count").innerText = identityKeys.length;
        
        identityKeys.forEach(pName => {
            gridBox.innerHTML += `<div class="player-chip" onclick="openModModal('${pName}')">⚡ ${pName}</div>`;
        });
        if(identityKeys.length === 0) document.getElementById("action-launch-trigger").style.display = "none";
    }

    /* MODERATION PROTOCOLS */
    function openModModal(name) {
        moddingPlayerName = name;
        document.getElementById("mod-target-title").innerText = `Moderate: ${name}`;
        document.getElementById("mod-name-input").value = name;
        document.getElementById("mod-modal").classList.remove("hidden");
    }

    function closeModModal() { document.getElementById("mod-modal").classList.add("hidden"); }

    function executeRename() {
        let newName = document.getElementById("mod-name-input").value.trim();
        if(!newName || newName === moddingPlayerName) return closeModModal();
        
        if(trackingScoreboardMap[newName] !== undefined) {
            alert("Name already in use!"); return;
        }

        // Migrate internal references
        trackingScoreboardMap[newName] = trackingScoreboardMap[moddingPlayerName];
        playerPeerIdMap[newName] = playerPeerIdMap[moddingPlayerName];
        activeClientConnections[newName] = activeClientConnections[moddingPlayerName];
        
        delete trackingScoreboardMap[moddingPlayerName];
        delete playerPeerIdMap[moddingPlayerName];
        delete activeClientConnections[moddingPlayerName];

        activeClientConnections[newName].send({ type: 'FORCE_RENAME', newName: newName });
        
        refreshLobbyRosterView();
        closeModModal();
    }

    function executeKick() {
        let conn = activeClientConnections[moddingPlayerName];
        if(conn) {
            conn.send({ type: 'KICKED' });
            setTimeout(() => conn.close(), 300);
        }
        removePlayerLocally(moddingPlayerName);
        closeModModal();
    }

    function executeBan() {
        let pId = playerPeerIdMap[moddingPlayerName];
        if(pId) bannedPeerIds.add(pId);
        executeKick();
    }

    function removePlayerLocally(name) {
        delete trackingScoreboardMap[name];
        delete playerPeerIdMap[name];
        delete activeClientConnections[name];
        refreshLobbyRosterView();
    }

    /* MATCH ENGINE CENTRAL LOOP */
    function broadcastStartSignal() {
        selectedTimerDuration = parseInt(document.getElementById("timer-selection").value);
        document.getElementById("stage-lobby").classList.add("hidden");
        document.getElementById("stage-match").classList.remove("hidden");
        launchQuestionIteration();
    }

    function launchQuestionIteration() {
        matchPhase = "QUESTION";
        answersSubmittedThisRound = 0;
        activeSecondsLeft = selectedTimerDuration;
        
        let currentWordData = vocabPool[currentQuestionIndex];
        document.getElementById("hud-q-index").innerText = currentQuestionIndex + 1;
        document.getElementById("current-question-text").innerText = `"${currentWordData.french}" means...`;
        
        shufflesThisRound = [currentWordData.english, ...currentWordData.wrongs].sort(() => 0.5 - Math.random());
        
        let optionNodes = document.querySelectorAll("#options-container-grid .display-option");
        optionNodes.forEach((node, index) => {
            node.className = "display-option";
            node.querySelector(".opt-text").innerText = shufflesThisRound[index];
        });

        updateAnswerHUDCount();
        document.getElementById("hud-timer").innerText = activeSecondsLeft;
        document.getElementById("next-step-btn").innerText = "Skip Timer";

        // Message players to draw control inputs
        Object.keys(activeClientConnections).forEach(name => {
            activeClientConnections[name].send({
                type: 'SHOW_QUESTION',
                options: shufflesThisRound,
                qIndex: currentQuestionIndex
            });
        });

        countdownInterval = setInterval(() => {
            activeSecondsLeft--;
            document.getElementById("hud-timer").innerText = activeSecondsLeft;
            if(activeSecondsLeft <= 0) {
                revealRoundResults();
            }
        }, 1000);
    }

    function updateAnswerHUDCount() {
        document.getElementById("hud-answers-counter").innerText = `Answers: ${answersSubmittedThisRound} / ${Object.keys(trackingScoreboardMap).length}`;
    }

    function revealRoundResults() {
        clearInterval(countdownInterval);
        matchPhase = "REVEAL";
        
        let currentWordData = vocabPool[currentQuestionIndex];
        let optionNodes = document.querySelectorAll("#options-container-grid .display-option");
        
        optionNodes.forEach(node => {
            let txt = node.querySelector(".opt-text").innerText;
            if(txt === currentWordData.english) {
                node.classList.add("correct");
            } else {
                node.classList.add("revealed");
            }
        });

        Object.keys(activeClientConnections).forEach(name => {
            activeClientConnections[name].send({ type: 'ROUND_ENDED', correct: currentWordData.english });
        });

        document.getElementById("next-step-btn").innerText = (currentQuestionIndex < vocabPool.length - 1) ? "Next Question" : "Show Results";
    }

    function progressGameLoop() {
        if (matchPhase === "QUESTION") {
            revealRoundResults();
        } else if (matchPhase === "REVEAL") {
            currentQuestionIndex++;
            if (currentQuestionIndex < vocabPool.length) {
                launchQuestionIteration();
            } else {
                renderFinalStandings();
            }
        }
    }

    function renderFinalStandings() {
        matchPhase = "END";
        document.getElementById("stage-match").classList.add("hidden");
        document.getElementById("stage-scoreboard").classList.remove("hidden");
        
        const targetedTableBody = document.getElementById("scoreboard-table-body");
        targetedTableBody.innerHTML = "";
        
        let structuredRankingsArray = Object.entries(trackingScoreboardMap).sort((alpha, beta) => beta[1] - alpha[1]);
        
        structuredRankingsArray.forEach(([competitorName, pointsValue], positionIndex) => {
            let rankLabel = `#${positionIndex + 1}`;
            if(positionIndex === 0) rankLabel = "🥇 1st";
            if(positionIndex === 1) rankLabel = "🥈 2nd";
            if(positionIndex === 2) rankLabel = "🥉 3rd";

            targetedTableBody.innerHTML += `<tr><td>${rankLabel}</td><td>${competitorName}</td><td>${pointsValue} pts</td></tr>`;
        });
    }
</script>
</body>
</html>
