<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet de Vocab - Host</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --green: #10b981;
            --blue: #3b82f6;
            --red: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif; margin: 0; padding: 20px; min-height: 100vh; 
            color: #f8fafc; background: var(--bg-dark); display: flex; justify-content: center; align-items: center;
        }
        .container { width: 100%; max-width: 900px; background: var(--panel-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px; text-align: center; }
        h1 { margin: 0 0 10px 0; font-size: 2.5rem; }
        .subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 1.1rem; }
        
        .lobby-view { display: flex; gap: 30px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
        .qr-box { background: white; padding: 16px; border-radius: 16px; display: inline-block; min-width: 180px; min-height: 180px; }
        .code-tag { font-family: monospace; font-size: 1.3rem; font-weight: bold; color: #38bdf8; margin-top: 10px; display: block; }
        
        .players-box { width: 350px; background: rgba(0, 0, 0, 0.2); border-radius: 16px; padding: 20px; text-align: left; }
        .players-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .player-card { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; transition: background 0.2s; }
        .player-card:hover { background: rgba(255, 255, 255, 0.1); }

        .btn { background: var(--green); color: white; border: none; padding: 14px 40px; font-size: 1.3rem; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .hidden { display: none !important; }

        .hud { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; font-size: 1.1rem; font-weight: bold; }
        .question { background: white; color: var(--bg-dark); padding: 30px; border-radius: 16px; font-size: 2.3rem; font-weight: 900; margin-bottom: 20px; }
        .feed { min-height: 40px; color: #fbbf24; font-weight: bold; margin-bottom: 20px; padding: 10px; background: rgba(251, 191, 36, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .option { background: rgba(255,255,255,0.05); border: 2px solid var(--border); padding: 20px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; text-align: left; position: relative; overflow: hidden; display: flex; justify-content: space-between; align-items: center; }
        .opt-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: rgba(255,255,255,0.05); transition: width 0.5s; z-index: 1; }
        .opt-text { z-index: 2; }
        .opt-pct { z-index: 2; display: none; }
        .option.correct { border-color: var(--green); color: #34d399; }
        .option.correct .opt-bar { background: rgba(16, 185, 129, 0.15); }
        .option.wrong { opacity: 0.4; }

        .text-results-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; text-align: left; margin-bottom: 30px; }
        .text-results-box h4 { margin: 0 0 10px 0; color: #94a3b8; }
        .text-answer-item { padding: 10px; border-radius: 6px; margin-bottom: 6px; font-weight: bold; background: rgba(255,255,255,0.05); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; font-size: 1.1rem; border-bottom: 1px solid var(--border); }
        th { color: #94a3b8; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-inner { background: #1e293b; padding: 25px; border-radius: 16px; width: 320px; }
        .modal-inner input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid var(--border); background: #0f172a; color: white; }
        .modal-btns { display: flex; flex-direction: column; gap: 8px; }
        .m-btn { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-lobby">
        <h1>Projet de Vocabulaire</h1>
        <p class="subtitle">Scan to join the room</p>
        
        <div class="lobby-view">
            <div>
                <div class="qr-box" id="qrcode"></div>
                <span class="code-tag" id="room-code">Connecting...</span>
            </div>
            
            <div class="players-box">
                <h3>Players (<span id="player-count">0</span>)</h3>
                <div class="players-list" id="players-list-target"></div>
            </div>
        </div>
        
        <button id="start-btn" class="btn" style="display:none;" onclick="startGame()">Start Game</button>
    </div>

    <div id="view-game" class="hidden">
        <div class="hud">
            <div>Question <span id="hud-index">1</span>/6</div>
            <div style="color:#fbbf24;" id="hud-timer">--</div>
            <div id="hud-done">Done: 0/0</div>
        </div>

        <div class="question" id="q-text">...</div>
        
        <div class="feed" id="game-feed">Waiting for answers...</div>

        <div class="options-grid" id="options-grid">
            <div class="option"><div class="opt-bar"></div><span class="opt-text"></span><span class="opt-pct">0%</span></div>
            <div class="option"><div class="opt-bar"></div><span class="opt-text"></span><span class="opt-pct">0%</span></div>
            <div class="option"><div class="opt-bar"></div><span class="opt-text"></span><span class="opt-pct">0%</span></div>
            <div class="option"><div class="opt-bar"></div><span class="opt-text"></span><span class="opt-pct">0%</span></div>
        </div>

        <div class="text-results-box hidden" id="text-results-area">
            <h4>Submitted Answers:</h4>
            <div id="text-answers-list"></div>
        </div>

        <button class="btn" id="next-btn" onclick="nextStep()">Reveal Answer</button>
    </div>

    <div id="view-scores" class="hidden">
        <h1>Leaderboard</h1>
        <p class="subtitle">Final Standings</p>
        <table>
            <thead>
                <tr><th>Rank</th><th>Player</th><th>Score</th></tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <button class="btn" onclick="window.location.reload()">Host New Game</button>
    </div>
</div>

<div class="modal hidden" id="mod-modal">
    <div class="modal-inner">
        <h3 id="mod-title" style="margin-top:0;">Manage Player</h3>
        <input type="text" id="mod-input">
        <div class="modal-btns">
            <button class="m-btn" style="background:var(--blue);color:white;" onclick="saveRename()">Rename</button>
            <button class="m-btn" style="background:#f97316;color:white;" onclick="kickPlayer()">Kick</button>
            <button class="m-btn" style="background:var(--red);color:white;" onclick="banPlayer()">Ban</button>
            <button class="m-btn" style="background:#475569;color:white;" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    const PLAYER_PAGE_URL = "player.html";

    // Cleaned up the spelling/gender typos ("Un taille-crayon" / "Un classeur")
    const questions = [
        { f: "Une presse papier", e: "A clipboard", w: ["A thumbtack", "Chess", "A pencil sharpener"], type: "choice" },
        { f: "Une punaise", e: "A thumbtack", w: ["A clipboard", "A binder", "A binder clip"], type: "choice" },
        { f: "Le jeu d’échecs", e: "Chess", w: ["A pencil sharpener", "A clipboard", "A binder"], type: "choice" },
        { f: "Un taille-crayon", e: "A pencil sharpener", type: "text" }, 
        { f: "Un classeur", e: "A binder", w: ["A clipboard", "A pencil sharpener", "A binder clip"], type: "choice" },
        { f: "Une pince a trombone", e: "A binder clip", w: ["A thumbtack", "Chess", "A binder"], type: "choice" }
    ];

    const roomCode = Math.random().toString(36).substring(2,6).toUpperCase();
    let scores = {}, peerIds = {}, connections = {}, banned = new Set();
    
    let qIdx = 0, timeLeft = 25, timerInterval = null, answersCount = 0, state = "LOBBY", order = [];
    let votes = {}, protectedPlayers = new Set(), answeredPlayers = new Set(), selectedModUser = "";
    let typedAnswers = [];

    const peer = new Peer(roomCode);

    peer.on('open', (id) => {
        document.getElementById("room-code").innerText = "ROOM CODE: " + id;
        
        let targetURL = window.location.href.toLowerCase().includes("host.html") 
            ? window.location.href.replace(/host\.html/i, PLAYER_PAGE_URL)
            : window.location.href + PLAYER_PAGE_URL;
            
        targetURL += "?room=" + id;

        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: targetURL, width: 180, height: 180 });
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            let pId = conn.peer;
            if (banned.has(pId)) {
                conn.send({ type: 'BANNED' });
                return;
            }

            if (data.type === 'JOIN') {
                let name = data.name.trim();
                if (scores[name] !== undefined) name += "_" + Math.floor(Math.random() * 10);
                
                scores[name] = 0;
                peerIds[name] = pId;
                connections[name] = conn;
                
                conn.send({ type: 'JOIN_OK', name: name });
                updateLobby();

                // Setup listener for dynamic player disconnects mid-round
                conn.on('close', () => {
                    handleDisconnect(name);
                });
            }
            
            if (data.type === 'USE_BLOCK') {
                if (state !== "QUESTION") return;
                protectedPlayers.add(data.name);
                document.getElementById("game-feed").innerText = `🛡️ ${data.name} activated a Block!`;
            }

            if (data.type === 'USE_STRIKE') {
                if (state !== "QUESTION") return;
                let attacker = data.name;
                let target = data.target;

                if (protectedPlayers.has(target)) {
                    scores[attacker] = Math.max(0, scores[attacker] - 400);
                    document.getElementById("game-feed").innerText = `🛡️ Countered! ${attacker} hit ${target}'s Block and lost 400 pts!`;
                } else {
                    scores[target] = Math.max(0, scores[target] - 400);
                    document.getElementById("game-feed").innerText = `💥 ${attacker} used Strike on ${target}! -400 pts.`;
                }
            }
            
            if (data.type === 'SUBMIT') {
                if (state !== "QUESTION" || answeredPlayers.has(data.name)) return;
                
                answeredPlayers.add(data.name);
                answersCount++;
                document.getElementById("hud-done").innerText = `Done: ${answersCount} / ${Object.keys(scores).length}`;
                
                let currentQuestion = questions[qIdx];

                if (currentQuestion.type === "text") {
                    typedAnswers.push({ name: data.name, text: data.choice });
                    
                    // Added normalization to handle hyphens gracefully
                    let normalPlayer = data.choice.trim().toLowerCase().replace(/[\s-]/g, '');
                    let normalAnswer = currentQuestion.f.trim().toLowerCase().replace(/[\s-]/g, '');
                    if (normalPlayer === normalAnswer) {
                        scores[data.name] += 150 + (timeLeft * 5); 
                    }
                } else {
                    votes[data.choice] = (votes[data.choice] || 0) + 1;
                    if (data.choice === currentQuestion.f) {
                        scores[data.name] += 100 + (timeLeft * 5);
                    }
                }
                
                if (answersCount >= Object.keys(scores).length) {
                    revealAnswer();
                }
            }
        });
    });

    function handleDisconnect(name) {
        if (scores[name] === undefined) return;
        delete scores[name];
        delete peerIds[name];
        delete connections[name];
        
        if (state === "LOBBY") {
            updateLobby();
        } else if (state === "QUESTION") {
            if (answeredPlayers.has(name)) {
                answersCount = Math.max(0, answersCount - 1);
            }
            document.getElementById("hud-done").innerText = `Done: ${answersCount} / ${Object.keys(scores).length}`;
            if (Object.keys(scores).length === 0 || answersCount >= Object.keys(scores).length) {
                revealAnswer();
            }
        }
    }

    function updateLobby() {
        const target = document.getElementById("players-list-target");
        target.innerHTML = "";
        const list = Object.keys(scores);
        document.getElementById("player-count").innerText = list.length;
        list.forEach(p => {
            target.innerHTML += `<div class="player-card" onclick="openMod('${p}')">${p}</div>`;
        });
        document.getElementById("start-btn").style.display = list.length > 0 ? "inline-block" : "none";
    }

    function openMod(name) {
        selectedModUser = name;
        document.getElementById("mod-title").innerText = name;
        document.getElementById("mod-input").value = name;
        document.getElementById("mod-modal").classList.remove("hidden");
    }
    function closeModal() { document.getElementById("mod-modal").classList.add("hidden"); }

    function saveRename() {
        let nu = document.getElementById("mod-input").value.trim();
        if(!nu || nu === selectedModUser) return closeModal();
        if(scores[nu] !== undefined) return alert("Name taken");

        scores[nu] = scores[selectedModUser];
        peerIds[nu] = peerIds[selectedModUser];
        connections[nu] = connections[selectedModUser];
        
        delete scores[selectedModUser];
        delete peerIds[selectedModUser];
        delete connections[selectedModUser];

        if (connections[nu]) connections[nu].send({ type: 'RENAME', name: nu });
        updateLobby();
        closeModal();
    }

    function kickPlayer() {
        let c = connections[selectedModUser];
        if(c) { c.send({ type: 'KICK' }); setTimeout(() => c.close(), 200); }
        handleDisconnect(selectedModUser);
        closeModal();
    }
    function banPlayer() { let id = peerIds[selectedModUser]; if(id) banned.add(id); kickPlayer(); }

    function startGame() {
        document.getElementById("view-lobby").classList.add("hidden");
        document.getElementById("view-game").classList.remove("hidden");
        loadQuestion();
    }

    function loadQuestion() {
        state = "QUESTION";
        answersCount = 0;
        timeLeft = 25;
        votes = {};
        typedAnswers = [];
        protectedPlayers.clear();
        answeredPlayers.clear();
        document.getElementById("game-feed").innerText = "Incoming turn items generated...";
        
        let curr = questions[qIdx];
        document.getElementById("hud-index").innerText = qIdx + 1;
        document.getElementById("q-text").innerText = `What is "${curr.e}" in French?`;
        
        if (curr.type === "text") {
            document.getElementById("options-grid").classList.add("hidden");
            document.getElementById("text-results-area").classList.add("hidden");
            document.getElementById("text-answers-list").innerHTML = "";
            order = [];
        } else {
            document.getElementById("options-grid").classList.remove("hidden");
            document.getElementById("text-results-area").classList.add("hidden");
            order = [curr.f, ...curr.w].sort(() => 0.5 - Math.random());
            
            let nodes = document.querySelectorAll("#options-grid .option");
            nodes.forEach((node, i) => {
                node.className = "option";
                node.querySelector(".opt-text").innerText = order[i];
                node.querySelector(".opt-pct").style.display = "none";
                node.querySelector(".opt-bar").style.width = "0%";
            });
        }

        document.getElementById("hud-done").innerText = `Done: 0 / ${Object.keys(scores).length}`;
        document.getElementById("hud-timer").innerText = timeLeft;
        document.getElementById("next-btn").innerText = "Skip Timer";

        let pList = Object.keys(scores);
        pList.forEach(p => {
            let item = null;
            if (Math.random() < 0.15) {
                item = (Math.random() < 0.5) ? "STRIKE" : "BLOCK";
            }
            if (connections[p]) {
                connections[p].send({
                    type: 'ASK',
                    qMode: curr.type,
                    options: order,
                    targets: pList.filter(x => x !== p),
                    item: item
                });
            }
        });

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById("hud-timer").innerText = timeLeft;
            if(timeLeft <= 0) revealAnswer();
        }, 1000);
    }

    function revealAnswer() {
        clearInterval(timerInterval);
        state = "REVEAL";
        
        let curr = questions[qIdx];

        if (curr.type === "text") {
            document.getElementById("text-results-area").classList.remove("hidden");
            let container = document.getElementById("text-answers-list");
            container.innerHTML = `<div style="padding:12px; margin-bottom:15px; border-radius:8px; background:rgba(16,185,129,0.2); border:1px solid var(--green); color:#34d399;"><strong>Correct Answer:</strong> ${curr.f}</div>`;
            
            if (typedAnswers.length === 0) {
                container.innerHTML += `<div style="color:#64748b; font-style:italic;">No answers submitted.</div>`;
            } else {
                typedAnswers.forEach(ans => {
                    let normalPlayer = ans.text.trim().toLowerCase().replace(/[\s-]/g, '');
                    let normalAnswer = curr.f.trim().toLowerCase().replace(/[\s-]/g, '');
                    let isRight = normalPlayer === normalAnswer;
                    let colorStyle = isRight ? "border-left: 5px solid var(--green);" : "border-left: 5px solid var(--red);";
                    container.innerHTML += `<div class="text-answer-item" style="${colorStyle}"><strong>${ans.name}:</strong> "${ans.text}"</div>`;
                });
            }
        } else {
            let nodes = document.querySelectorAll("#options-grid .option");
            let total = 0;
            Object.values(votes).forEach(v => total += v);
            if(total === 0) total = 1;

            nodes.forEach(node => {
                let txt = node.querySelector(".opt-text").innerText;
                let count = votes[txt] || 0;
                let pct = Math.round((count / total) * 100);
                
                let label = node.querySelector(".opt-pct");
                let bar = node.querySelector(".opt-bar");
                label.innerText = `${pct}%`;
                label.style.display = "block";
                bar.style.width = `${pct}%`;

                if(txt === curr.f) node.classList.add("correct");
                else node.classList.add("wrong");
            });
        }

        Object.keys(connections).forEach(p => {
            if (connections[p]) connections[p].send({ type: 'REVEAL', correct: curr.f });
        });

        document.getElementById("next-btn").innerText = (qIdx < questions.length - 1) ? "Next Question" : "Show Rankings";
    }

    function nextStep() {
        if (state === "QUESTION") revealAnswer();
        else {
            qIdx++;
            if (qIdx < questions.length) loadQuestion();
            else showFinals();
        }
    }

    function showFinals() {
        document.getElementById("view-game").classList.add("hidden");
        document.getElementById("view-scores").classList.remove("hidden");
        const body = document.getElementById("leaderboard-body");
        body.innerHTML = "";
        
        Object.entries(scores).sort((a,b) => b[1]-a[1]).forEach(([name, pts], i) => {
            body.innerHTML += `<tr><td>#${i+1}</td><td>${name}</td><td>${pts} pts</td></tr>`;
        });
    }
</script>
</body>
</html>
