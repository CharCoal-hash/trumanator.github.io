<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Quiz - Game Panel</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;
            --accent: #4f46e5;
        }
        * { box-sizing: border-box; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 16px; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(-45deg, #ff7b90, #ffae77, #7bc8ff, #9873ff); background-size: 400% 400%; animation: fluidGradient 12s ease infinite; }
        @keyframes fluidGradient { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }

        .app-window { width: 100%; max-width: 420px; background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); overflow: hidden; display: flex; flex-direction: column; }
        .top-navbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(255, 255, 255, 0.4); border-bottom: 1px solid var(--glass-border); }
        .nav-pill { background: white; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; color: #475569; }
        
        .content-body { padding: 24px; text-align: center; }
        h2 { color: var(--text-main); margin-top: 0; font-size: 1.6rem; font-weight: 800; }
        p { color: #64748b; font-size: 1rem; line-height: 1.5; }
        input[type="text"] { width: 100%; padding: 16px; font-size: 1.1rem; border: 2px solid #e2e8f0; border-radius: 14px; margin: 16px 0; outline: none; text-align: center; font-weight: 600; }
        .action-button { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; font-size: 1.1rem; font-weight: 700; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }

        .quiz-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .option-item { background: white; border: 2px solid #e2e8f0; padding: 18px; font-size: 1.1rem; border-radius: 14px; cursor: pointer; color: var(--text-main); font-weight: 700; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Combat Mechanics Controls Layout */
        .combat-action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; border-top: 2px dashed rgba(0,0,0,0.06); padding-top: 15px; }
        .combat-btn { padding: 14px; font-weight: bold; font-size: 0.95rem; border-radius: 12px; border: none; cursor: pointer; color: white; }
        .btn-strike { background: #ef4444; }
        .btn-block { background: #3b82f6; }

        .target-select-box { width: 100%; background: white; padding: 10px; border-radius: 10px; margin-top: 10px; font-weight: 600; font-size: 1rem; }

        .shape { width: 16px; height: 16px; border-radius: 4px; }
        .shape-0 { background: #ef4444; } .shape-1 { background: #3b82f6; } .shape-2 { background: #eab308; } .shape-3 { background: #10b981; }

        .option-item.selected { background: #1e293b !important; color: white !important; border-color: #1e293b !important; }
        .option-item.correct { background: #10b981 !important; border-color: #10b981 !important; color: white !important; }
        .option-item.wrong { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; }

        .hidden { display: none !important; }
        .pulse-loader { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; margin: 30px auto; animation: pulse 1.8s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.6); opacity: 0.4; } 50% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="app-window">
    <div class="top-navbar">
        <div class="nav-pill" id="hud-name">🇫🇷 Join</div>
        <div class="nav-pill" style="background:#fef3c7; color:#b45309;" id="hud-status-pill">Lobby</div>
    </div>

    <div class="content-body">
        <div id="panel-join">
            <h2>Rejoindre</h2>
            <p>Type your name to step into the shared presentation room.</p>
            <input type="text" id="username" placeholder="Your Name" maxlength="14" autocomplete="off">
            <button class="action-button" onclick="connectToHost()">Enter Game</button>
            <p id="network-status" style="margin-top: 15px; font-size: 0.85rem; font-weight: 600; color:#ef4444;"></p>
        </div>

        <div id="panel-wait" class="hidden">
            <h2 id="wait-title">Prêt !</h2>
            <p id="wait-desc">The match loop is controlled by the host room projector.</p>
            <div class="pulse-loader"></div>
        </div>

        <div id="panel-quiz" class="hidden">
            <h2 style="margin-bottom:0px;">Your Move</h2>
            <p style="margin-top:0; font-size:0.9rem; color:#64748b;">Answer correctly or play a combat card</p>
            
            <div class="quiz-grid" id="interactive-options-box">
                <div class="option-item" onclick="handleAnswerSelection(this)"><span class="shape shape-0"></span> <span class="lbl-txt"></span></div>
                <div class="option-item" onclick="handleAnswerSelection(this)"><span class="shape shape-1"></span> <span class="lbl-txt"></span></div>
                <div class="option-item" onclick="handleAnswerSelection(this)"><span class="shape shape-2"></span> <span class="lbl-txt"></span></div>
                <div class="option-item" onclick="handleAnswerSelection(this)"><span class="shape shape-3"></span> <span class="lbl-txt"></span></div>
            </div>

            <div class="combat-action-bar" id="combat-container">
                <button class="combat-btn btn-strike" onclick="triggerStrikeAction()">💥 Strike</button>
                <button class="combat-btn btn-block" onclick="triggerBlockAction()">🛡️ Block</button>
            </div>
            <div id="strike-target-zone" class="hidden">
                <p style="margin: 5px 0; font-size:0.85rem; font-weight:bold;">Select Target:</p>
                <select id="strike-target-dropdown" class="target-select-box"></select>
                <button class="action-button" style="padding:10px; font-size:0.95rem; margin-top:8px; background:#ef4444;" onclick="finalizeStrikeDelivery()">Launch Strike</button>
            </div>
        </div>

        <div id="panel-disconn" class="hidden">
            <h2 id="disconn-title">Disconnected</h2>
            <p id="disconn-desc">You are no longer connected to this room session.</p>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetRoomId = urlParams.get('room');
    
    let peer, connection;
    let registeredName = "";
    let interactionAllowed = false;
    let currentlySelectedBtn = null;

    if (!targetRoomId) document.getElementById("network-status").innerText = "⚠️ Missing Room Parameter.";

    function connectToHost() {
        registeredName = document.getElementById("username").value.trim();
        if(!registeredName) return alert("Please specify a player nickname.");
        document.getElementById("network-status").innerText = "Connecting...";
        peer = new Peer();
        
        peer.on('open', () => {
            connection = peer.connect(targetRoomId);
            connection.on('open', () => { connection.send({ type: 'JOIN', name: registeredName }); });

            connection.on('data', (payload) => {
                if(payload.type === 'JOIN_CONFIRM') {
                    registeredName = payload.assignedName;
                    document.getElementById("hud-name").innerText = "👤 " + registeredName;
                    document.getElementById("panel-join").classList.add("hidden");
                    setIntermissionState("Connected!", "The game loop is controlled by the host. Sit tight!");
                }
                if(payload.type === 'FORCE_RENAME') {
                    registeredName = payload.newName;
                    document.getElementById("hud-name").innerText = "👤 " + registeredName;
                }
                if(payload.type === 'KICKED') showDisconnectUI("Kicked", "You were removed from this session.");
                if(payload.type === 'BANNED') showDisconnectUI("Banned", "Your network identification is banned.");
                
                if (payload.type === 'SHOW_QUESTION') {
                    displayInputGrid(payload.options, payload.playersList);
                }
                if (payload.type === 'ROUND_ENDED') {
                    revealInputGridAnswer(payload.correct);
                }
            });

            connection.on('close', () => { showDisconnectUI("Disconnected", "Server closed connection."); });
        });
    }

    function setIntermissionState(title, message) {
        document.getElementById("hud-status-pill").innerText = "Waiting";
        document.getElementById("hud-status-pill").style.background = "#fef3c7";
        document.getElementById("hud-status-pill").style.color = "#b45309";
        
        document.getElementById("panel-quiz").classList.add("hidden");
        document.getElementById("wait-title").innerText = title;
        document.getElementById("wait-desc").innerText = message;
        document.getElementById("panel-wait").classList.remove("hidden");
    }

    function displayInputGrid(choices, targetsList) {
        interactionAllowed = true;
        currentlySelectedBtn = null;
        
        document.getElementById("hud-status-pill").innerText = "ACTIVE";
        document.getElementById("hud-status-pill").style.background = "#d1fae5";
        document.getElementById("hud-status-pill").style.color = "#065f46";

        document.getElementById("panel-wait").classList.add("hidden");
        document.getElementById("panel-quiz").classList.remove("hidden");
        document.getElementById("combat-container").classList.remove("hidden");
        document.getElementById("strike-target-zone").classList.add("hidden");
        
        let items = document.querySelectorAll("#interactive-options-box .option-item");
        items.forEach((item, index) => {
            item.className = "option-item";
            item.querySelector(".lbl-txt").innerText = choices[index];
        });

        // Populate targets dropdown
        let selectNode = document.getElementById("strike-target-dropdown");
        selectNode.innerHTML = "";
        if (targetsList.length === 0) {
            selectNode.innerHTML = "<option>No available targets</option>";
        } else {
            targetsList.forEach(p => { selectNode.innerHTML += `<option value="${p}">${p}</option>`; });
        }
    }

    function handleAnswerSelection(btn) {
        if(!interactionAllowed) return;
        interactionAllowed = false;
        currentlySelectedBtn = btn;
        btn.classList.add("selected");
        
        connection.send({
            type: 'ANSWER_SUBMIT',
            name: registeredName,
            choice: btn.querySelector(".lbl-txt").innerText
        });
    }

    /* ACTIONS CALLED BY COMBAT CONTROLS PANEL */
    function triggerBlockAction() {
        if(!interactionAllowed) return;
        interactionAllowed = false;
        
        document.getElementById("combat-container").classList.add("hidden");
        connection.send({ type: 'BLOCK_ACTIVATE', name: registeredName });
        setIntermissionState("Shield Deployed 🛡️", "You chose to block this round. Shield backfires will deflect enemy strikes!");
    }

    function triggerStrikeAction() {
        if(!interactionAllowed) return;
        document.getElementById("combat-container").classList.add("hidden");
        document.getElementById("strike-target-zone").classList.remove("hidden");
    }

    function finalizeStrikeDelivery() {
        if(!interactionAllowed) return;
        let selectedTarget = document.getElementById("strike-target-dropdown").value;
        if(!selectedTarget || selectedTarget === "No available targets") return alert("No player available to strike!");
        
        interactionAllowed = false;
        document.getElementById("strike-target-zone").classList.add("hidden");
        
        connection.send({
            type: 'STRIKE_LAUNCH',
            name: registeredName,
            target: selectedTarget
        });

        setIntermissionState("Strike Transmitted 💥", `You launched an attack targeting ${selectedTarget}!`);
    }

    function revealInputGridAnswer(correctString) {
        interactionAllowed = false;
        let items = document.querySelectorAll("#interactive-options-box .option-item");
        items.forEach(item => {
            let itemText = item.querySelector(".lbl-txt").innerText;
            item.classList.remove("selected");
            if(itemText === correctString) {
                item.classList.add("correct");
            } else if(item === currentlySelectedBtn) {
                item.classList.add("wrong");
            }
        });

        setTimeout(() => {
            if(document.getElementById("panel-quiz").classList.contains("hidden")) return;
            setIntermissionState("Round Finished", "Gathering scores... Watch the presentation screen.");
        }, 3000);
    }

    function showDisconnectUI(title, msg) {
        document.getElementById("panel-join").classList.add("hidden");
        document.getElementById("panel-wait").classList.add("hidden");
        document.getElementById("panel-quiz").classList.add("hidden");
        document.getElementById("disconn-title").innerText = title;
        document.getElementById("disconn-desc").innerText = msg;
        document.getElementById("panel-disconn").classList.remove("hidden");
        if(connection) connection.close();
    }
</script>
</body>
</html>
