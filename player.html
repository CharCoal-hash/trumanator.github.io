<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Quiz - Presentation Core</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --glass-panel: rgba(15, 23, 42, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: hostBackground 16s ease infinite;
        }

        @keyframes hostBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-stage {
            width: 100%;
            max-width: 1000px;
            background: var(--glass-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 45px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .split-lobby {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        /* QR Dynamic Module Frame */
        .qr-node {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 24px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #qrcode {
            background: white;
            padding: 16px;
            border-radius: 16px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        #qrcode:hover {
            transform: scale(1.03);
        }

        .room-tag {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 800;
            color: #38bdf8;
            margin-top: 14px;
            background: rgba(56, 189, 248, 0.1);
            padding: 6px 14px;
            border-radius: 10px;
            display: inline-block;
        }

        /* Connected User Listing Group */
        .roster-card {
            width: 440px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.04);
            min-height: 290px;
            text-align: left;
        }

        .roster-card h3 {
            margin-top: 0;
            font-size: 1.3rem;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .player-chip {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Premium Dashboard Table controls */
        .launch-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.6rem;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            margin-top: 40px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: all 0.2s ease;
            display: none;
        }

        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(16, 185, 129, 0.5);
        }

        .hidden { display: none !important; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: 30px;
        }

        th {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            padding: 12px 20px;
            text-align: left;
        }

        td {
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.3rem;
            font-weight: 600;
        }

        td:first-child {
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px 0 0 14px;
            font-weight: 800;
            color: #38bdf8;
        }

        td:last-child {
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0 14px 14px 0;
            text-align: right;
            color: #f43f5e;
        }
    </style>
</head>
<body>

<div class="main-stage">
    <!-- VIEW ZONE 1: ENTRY ROOM LOBBY -->
    <div id="stage-lobby">
        <h1>Jeu de Vocabulaire Français</h1>
        <p class="subtitle">Scan the QR code to join.</p>
        
        <div class="split-lobby">
            <div class="qr-node">
                <div id="qrcode"></div>
                <div><span class="room-tag" id="room-code-badge">Creating Network...</span></div>
            </div>
            
            <div class="roster-card">
                <h3>Active PLayers <span id="lobby-count" style="color:var(--accent-blue)">0</span></h3>
                <div class="badge-grid" id="lobby-grid-target"></div>
            </div>
        </div>
        
        <button id="action-launch-trigger" class="launch-btn" onclick="broadcastStartSignal()">START MATCH</button>
    </div>

    <!-- VIEW ZONE 2: RUNTIME LEADERBOARD -->
    <div id="stage-scoreboard" class="hidden">
        <h1 style="background: linear-gradient(to right, #f43f5e, #fb7185); -webkit-background-clip: text;">Standings</h1>
        <p class="subtitle" style="margin-bottom: 20px;">Answering live on screens</p>
        <table>
            <thead>
                <tr>
                    <th style="width: 15%">Rank</th>
                    <th style="width: 60%">Name</th>
                    <th style="width: 25%; text-align: right;">Total Points</th>
                </tr>
            </thead>
            <tbody id="scoreboard-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Link synchronization endpoint target
    const DEPLOYED_PLAYER_URL = "https://charcoal-hash.github.io/trumanator.github.io/player.html";

    // Expanded Presentation Question Database Group
    const vocabPool = [
        { french: "Bonjour", english: "Hello", wrongs: ["Goodbye", "Thank you", "Please"] },
        { french: "Chat", english: "Cat", wrongs: ["Dog", "Bird", "Mouse"] },
        { french: "Pomme", english: "Apple", wrongs: ["Banana", "Orange", "Grape"] },
        { french: "Livre", english: "Book", wrongs: ["Pen", "Chair", "Table"] },
        { french: "Voiture", english: "Car", wrongs: ["Bicycle", "Train", "Plane"] }
    ];

    function generateSecureId() {
        const structuralAlphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        let builtToken = "";
        for (let idx = 0; idx < 4; idx++) {
            builtToken += structuralAlphabet.charAt(Math.floor(Math.random() * structuralAlphabet.length));
        }
        return builtToken;
    }
    
    const calculatedRoomToken = generateSecureId();
    let trackingScoreboardMap = {}; 
    let activeClientConnections = [];

    // Instantiate Node Linkages
    const peerInstance = new Peer(calculatedRoomToken);

    peerInstance.on('open', (validatedId) => {
        document.getElementById("room-code-badge").innerText = "ROOM: " + validatedId;
        const compiledTargetUrl = `${DEPLOYED_PLAYER_URL}?room=${validatedId}`;
        
        new QRCode(document.getElementById("qrcode"), {
            text: compiledTargetUrl,
            width: 210,
            height: 210,
            colorDark : "#0f172a",
            colorLight : "#ffffff"
        });
    });

    peerInstance.on('connection', (incomingClientChannel) => {
        activeClientConnections.push(incomingClientChannel);
        
        incomingClientChannel.on('data', (incomingPackage) => {
            if (incomingPackage.type === 'JOIN') {
                trackingScoreboardMap[incomingPackage.name] = 0; 
                refreshLobbyRosterView();
                document.getElementById("action-launch-trigger").style.display = "inline-block";
            }
            if (incomingPackage.type === 'SCORE_UPDATE') {
                trackingScoreboardMap[incomingPackage.name] = incomingPackage.score;
                refreshLiveScoreboardView();
            }
        });
    });

    function refreshLobbyRosterView() {
        const gridBox = document.getElementById("lobby-grid-target");
        gridBox.innerHTML = "";
        const identityKeys = Object.keys(trackingScoreboardMap);
        document.getElementById("lobby-count").innerText = identityKeys.length;
        
        identityKeys.forEach(pName => {
            gridBox.innerHTML += `<div class="player-chip">⚡ ${pName}</div>`;
        });
    }

    function broadcastStartSignal() {
        activeClientConnections.forEach(clientChannel => {
            clientChannel.send({ type: 'START_GAME', words: vocabPool });
        });
        
        document.getElementById("stage-lobby").classList.add("hidden");
        document.getElementById("stage-scoreboard").classList.remove("hidden");
        refreshLiveScoreboardView();
    }

    function refreshLiveScoreboardView() {
        const targetedTableBody = document.getElementById("scoreboard-table-body");
        targetedTableBody.innerHTML = "";
        
        let structuredRankingsArray = Object.entries(trackingScoreboardMap).sort((alpha, beta) => beta[1] - alpha[1]);
        
        structuredRankingsArray.forEach(([competitorName, pointsValue], positionIndex) => {
            let rankLabel = `#${positionIndex + 1}`;
            if(positionIndex === 0) rankLabel = "🥇 1st";
            if(positionIndex === 1) rankLabel = "🥈 2nd";
            if(positionIndex === 2) rankLabel = "🥉 3rd";

            targetedTableBody.innerHTML += `
                <tr>
                    <td>${rankLabel}</td>
                    <td>${competitorName}</td>
                    <td>${pointsValue} pts</td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
